services:
  mysql:
    image: mysql:8.0
    container_name: sysjuros-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: sysjuros
    ports:
      - "3307:3306"
    volumes:
      - sysjuros-mysql-data:/var/lib/mysql

volumes:
  sysjuros-mysql-data:
